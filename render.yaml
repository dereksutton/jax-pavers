services:
  # Backend Web Service
  - type: web
    name: jax-pavers-api
    env: node
    region: oregon
    plan: starter
    buildCommand: cd backend && npm ci --production=false
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
    autoDeploy: false

  # Frontend Static Site
  - type: web
    name: jax-pavers-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=86400
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /sitemap.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /robots.txt
        destination: /robots.txt
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://jax-pavers-api.onrender.com/api
    autoDeploy: false